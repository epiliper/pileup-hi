name: Release

on:
  push:
    tags:
      - '*.*.*'  # Triggers on tags like v1.0.0, v0.1.2, etc.

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86-64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: linux-x86_64
            
          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: linux-aarch64
            cross: true
            
          # macOS x86-64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: macos-x86_64
            
          # macOS ARM64
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: macos-aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            zlib1g-dev \
            libbz2-dev \
            liblzma-dev \
            libcurl4-openssl-dev

      - name: Install htslib (Ubuntu x86-64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y libhts-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install htslib pkg-config

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.cross == true
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          
          # Build htslib from source for ARM64
          wget https://github.com/samtools/htslib/releases/download/1.19.1/htslib-1.19.1.tar.bz2
          tar -xjf htslib-1.19.1.tar.bz2
          cd htslib-1.19.1
          
          ./configure --host=aarch64-linux-gnu \
            --prefix=$HOME/htslib-aarch64 \
            CC=aarch64-linux-gnu-gcc \
            AR=aarch64-linux-gnu-ar \
            RANLIB=aarch64-linux-gnu-ranlib
          make -j$(nproc)
          make install
          
          # Set up pkg-config for cross-compilation
          echo "PKG_CONFIG_PATH=$HOME/htslib-aarch64/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
          echo "PKG_CONFIG_SYSROOT_DIR=$HOME/htslib-aarch64" >> $GITHUB_ENV

      - name: Set up cross-compilation environment (Linux ARM64)
        if: matrix.cross == true
        run: |
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV
          echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p artifacts
          # Adjust the binary name to match your project
          cp target/${{ matrix.target }}/release/pileuphi artifacts/
          cd artifacts
          tar -czf ../pileup-hi-${{ matrix.artifact_name }}.tar.gz *

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./pileup-hi-${{ matrix.artifact_name }}.tar.gz
          asset_name: pileup-hi-${{ github.ref_name }}-${{ matrix.artifact_name }}.tar.gz
          asset_content_type: application/gzip
